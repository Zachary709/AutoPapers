<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AutoPapers Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;600;700&display=swap"
    >
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <link rel="stylesheet" href="/assets/app.css">
  </head>
  <body>
    <div class="background-halo background-halo-a"></div>
    <div class="background-halo background-halo-b"></div>
    <div class="grain"></div>
    <div class="app-shell" id="appShell">
      <main class="studio-panel chat-panel" id="chatPanel">
        <header class="studio-header">
          <div>
            <div class="eyebrow">Task Console</div>
            <h2>LLM Dispatch</h2>
          </div>
          <div class="chip-row">
            <span class="chip" id="modelChip">Model</span>
            <span class="chip" id="jobChip">Idle</span>
          </div>
        </header>

        <section class="chat-feed" id="chatFeed"></section>

        <form class="composer" id="composerForm">
          <label class="field">
            <span>Prompt</span>
            <textarea
              id="promptInput"
              rows="4"
              placeholder="例如：帮我找最近关于多模态 agent planning 的 arXiv 论文，并结合本地已有论文总结差异。"
            ></textarea>
          </label>
          <div class="composer-controls">
            <label class="toggle">
              <input id="refreshExistingInput" type="checkbox">
              <span>重新整理已存在论文</span>
            </label>
            <label class="field field-compact">
              <span>Max Results</span>
              <input id="maxResultsInput" type="number" min="1" max="20" placeholder="5">
            </label>
            <button class="submit-button" type="submit" id="submitButton">Dispatch to LLM</button>
          </div>
        </form>
      </main>
      <div
        class="splitter splitter-vertical shell-splitter"
        id="chatDirectorySplitter"
        role="separator"
        aria-orientation="vertical"
        aria-label="调整对话区和目录区宽度"
        tabindex="0"
      >
        <span class="splitter-grip" aria-hidden="true"></span>
        <span class="splitter-label" aria-hidden="true"></span>
      </div>

      <aside class="directory-panel" id="directoryPanel">
        <div class="directory-header">
          <div class="eyebrow">AutoPapers Atlas</div>
          <h1>Paper Directory</h1>
          <p class="atlas-copy">左侧切一级方向，上方切二级方向，下方像文件列表一样浏览论文。</p>
          <label class="field field-search">
            <span>Search Directory</span>
            <input id="libraryFilter" type="search" placeholder="按主题、标题、线索过滤">
          </label>
          <div class="status-banner hidden" id="statusBanner"></div>
          <div class="stats-grid compact-stats" id="libraryStats"></div>
        </div>
        <section class="directory-explorer">
          <aside class="major-rail" id="majorRail"></aside>
          <div class="explorer-main">
            <div class="explorer-toolbar">
              <div class="breadcrumb-trail" id="libraryBreadcrumb"></div>
              <div class="minor-tabs" id="minorTabs"></div>
              <div class="explorer-summary" id="librarySummary"></div>
            </div>
            <div class="tree-wrap explorer-paper-list" id="libraryTree"></div>
          </div>
        </section>
      </aside>

      <div
        class="splitter splitter-vertical shell-splitter"
        id="directoryPreviewSplitter"
        role="separator"
        aria-orientation="vertical"
        aria-label="调整目录区和预览区宽度"
        tabindex="0"
      >
        <span class="splitter-grip" aria-hidden="true"></span>
        <span class="splitter-label" aria-hidden="true"></span>
      </div>

      <aside class="preview-panel" id="previewPanel">
        <div class="preview-header">
          <div class="eyebrow">Paper Preview</div>
          <h2>Reading Deck</h2>
          <p class="atlas-copy">这里展示当前选中论文的结构化摘要、操作按钮和 Markdown 预览。</p>
        </div>
        <section class="detail-dock preview-dock" id="paperDetail"></section>
      </aside>
    </div>
    <div class="toast-stack" id="toastStack"></div>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="/assets/app.js"></script>
  </body>
</html>
